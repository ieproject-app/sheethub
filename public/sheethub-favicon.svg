<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Card background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#16a34a"/>

  <!-- Inner grid bg -->
  <rect x="10" y="16" width="44" height="32" rx="5" fill="#15803d" opacity="0.5"/>

  <!-- Grid horizontal -->
  <line x1="10" y1="26" x2="54" y2="26" stroke="#4ade80" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="36" x2="54" y2="36" stroke="#4ade80" stroke-width="0.8" opacity="0.5"/>

  <!-- Grid vertical -->
  <line x1="28" y1="16" x2="28" y2="48" stroke="#4ade80" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="16" x2="42" y2="48" stroke="#4ade80" stroke-width="0.8" opacity="0.5"/>

  <!-- Active cell highlight -->
  <rect x="29" y="27" width="13" height="9" rx="2" fill="#4ade80" opacity="0.3"/>
  <rect x="29" y="27" width="13" height="9" rx="2" fill="none" stroke="#4ade80" stroke-width="1.2"/>

  <!-- fx label -->
  <text x="35" y="35" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="800" font-family="monospace">fx</text>

</svg>
